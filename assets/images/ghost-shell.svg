<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0d18"/>
      <stop offset="1" stop-color="#0a0a12"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#b026ff" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#b026ff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#b026ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <circle cx="640" cy="360" r="400" fill="url(#glow)"/>
  <g transform="translate(340,180)" stroke="#b026ff" stroke-width="2" fill="none">
    <rect x="0" y="0" width="260" height="320" rx="6"/>
    <rect x="320" y="0" width="260" height="150" rx="6"/>
    <rect x="320" y="170" width="260" height="150" rx="6"/>
  </g>
  <g font-family="monospace" font-size="14" fill="#b026ff">
    <text x="360" y="220">[ panel.main ]</text>
    <text x="360" y="250" opacity="0.6">  └─ render()</text>
    <text x="360" y="270" opacity="0.6">  └─ subscribe()</text>
    <text x="680" y="220">[ logs ]</text>
    <text x="680" y="250" opacity="0.6">  INFO  async loop ok</text>
    <text x="680" y="390">[ stats ]</text>
  </g>
  <text x="640" y="650" text-anchor="middle" font-family="monospace" font-size="36" fill="#b026ff" letter-spacing="8">GHOST SHELL</text>
  <text x="640" y="685" text-anchor="middle" font-family="monospace" font-size="14" fill="#8a8a9b" letter-spacing="4">// ASYNC TUI FRAMEWORK</text>
</svg>
