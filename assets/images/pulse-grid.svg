<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0d18"/>
      <stop offset="1" stop-color="#0a0a12"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#39ff14" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#39ff14" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#39ff14" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <circle cx="640" cy="360" r="400" fill="url(#glow)"/>
  <polyline fill="none" stroke="#39ff14" stroke-width="3" points="200,400 320,340 440,380 560,260 680,300 800,220 920,280 1040,180 1080,240"/>
  <polyline fill="none" stroke="#39ff14" stroke-width="2" opacity="0.4" points="200,460 320,420 440,440 560,380 680,400 800,340 920,380 1040,320 1080,360"/>
  <g fill="#39ff14">
    <circle cx="320" cy="340" r="5"/>
    <circle cx="560" cy="260" r="5"/>
    <circle cx="800" cy="220" r="5"/>
    <circle cx="1040" cy="180" r="5"/>
  </g>
  <text x="640" y="650" text-anchor="middle" font-family="monospace" font-size="36" fill="#39ff14" letter-spacing="8">PULSE GRID</text>
  <text x="640" y="685" text-anchor="middle" font-family="monospace" font-size="14" fill="#8a8a9b" letter-spacing="4">// DISTRIBUTED METRICS</text>
</svg>
