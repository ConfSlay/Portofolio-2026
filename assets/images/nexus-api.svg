<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0d18"/>
      <stop offset="1" stop-color="#0a0a12"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00f0ff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <circle cx="640" cy="360" r="400" fill="url(#glow)"/>
  <g stroke="#00f0ff" stroke-width="2" fill="none" opacity="0.8">
    <circle cx="640" cy="360" r="80"/>
    <circle cx="640" cy="360" r="140" opacity="0.5"/>
    <circle cx="640" cy="360" r="200" opacity="0.3"/>
  </g>
  <g fill="#00f0ff">
    <circle cx="440" cy="360" r="6"/>
    <circle cx="840" cy="360" r="6"/>
    <circle cx="640" cy="160" r="6"/>
    <circle cx="640" cy="560" r="6"/>
  </g>
  <g stroke="#00f0ff" stroke-width="1" opacity="0.4">
    <line x1="440" y1="360" x2="640" y2="360"/>
    <line x1="840" y1="360" x2="640" y2="360"/>
    <line x1="640" y1="160" x2="640" y2="360"/>
    <line x1="640" y1="560" x2="640" y2="360"/>
  </g>
  <text x="640" y="650" text-anchor="middle" font-family="monospace" font-size="36" fill="#00f0ff" letter-spacing="8">NEXUS API</text>
  <text x="640" y="685" text-anchor="middle" font-family="monospace" font-size="14" fill="#8a8a9b" letter-spacing="4">// REAL-TIME ORCHESTRATION</text>
</svg>
