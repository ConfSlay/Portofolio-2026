<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0d18"/>
      <stop offset="1" stop-color="#0a0a12"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff00e5" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff00e5" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ff00e5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <circle cx="640" cy="360" r="400" fill="url(#glow)"/>
  <g transform="translate(380,220)" fill="none" stroke="#ff00e5" stroke-width="2">
    <rect x="0" y="0" width="520" height="280" rx="8"/>
    <line x1="0" y1="40" x2="520" y2="40"/>
    <circle cx="20" cy="20" r="6" fill="#ff00e5"/>
    <circle cx="40" cy="20" r="6" fill="#ff00e5" opacity="0.6"/>
    <circle cx="60" cy="20" r="6" fill="#ff00e5" opacity="0.3"/>
  </g>
  <g font-family="monospace" font-size="18" fill="#ff00e5">
    <text x="400" y="300">&gt; void --init</text>
    <text x="400" y="330" opacity="0.7">  loading runtime...</text>
    <text x="400" y="360" opacity="0.9">  wasm module ready</text>
    <text x="400" y="390">&gt; _</text>
  </g>
  <text x="640" y="650" text-anchor="middle" font-family="monospace" font-size="36" fill="#ff00e5" letter-spacing="8">VOID RUNNER</text>
  <text x="640" y="685" text-anchor="middle" font-family="monospace" font-size="14" fill="#8a8a9b" letter-spacing="4">// WASM TERMINAL</text>
</svg>
